<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mirror the Miracle</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <main id="app-container">
        <div id="magic-mirror" class="mirror-frame" onclick="toggleMagic(event)">
            
            <video id="webcam" autoplay playsinline></video>
            
            <canvas id="magic-dust"></canvas>
            
            <div id="fog-layer"></div>

            <div id="memory-layer">
                <img id="memory-img" src="" alt="回憶碎片">
                <div id="memory-caption">
                    <h3 id="caption-title"></h3>
                    <p id="caption-desc"></p>
                </div>
            </div>

            <div id="ui-layer">
                <div class="magic-text">
                    <h1>Mirror the miracle</h1>
                    <p class="pulse-text">— 點擊鏡面，釋放魔法 —</p>
                </div>
            </div>
        </div>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
